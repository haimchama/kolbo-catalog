<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שולחן מחשב - Kolbo Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; color: #333; }
        header { background: #343a40; color: white; padding: 20px; }
        header .back-button { display: inline-block; background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 5px; text-decoration: none; color: white; margin-bottom: 15px; }
        header h1 { font-size: 2em; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .product-info { background: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-description { font-size: 1.1em; color: #666; margin-bottom: 10px; }
        .product-price { font-size: 1.3em; color: #667eea; font-weight: 600; margin-bottom: 15px; }
        .gallery-title { font-size: 1.5em; color: #667eea; margin: 30px 0 20px 0; }
        .image-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .gallery-item { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; height: 250px; }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 100%; max-height: 85vh; border-radius: 8px; }
        .lightbox-close { position: absolute; top: -40px; right: -40px; color: white; font-size: 40px; cursor: pointer; }
        footer { background: #f8f9fa; padding: 20px; text-align: center; color: #666; margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <div style="text-align: center; margin-bottom: 15px;">
            <img src="logokolbo.jpeg" alt="Kolbo Logo" style="height: 80px; width: auto; border-radius: 8px;">
        </div>
        <a href="index.html" class="back-button">ג† ׳—׳–׳¨׳” ׳׳§׳˜׳׳•׳’</a>
        <h1>שולחן מחשב</h1>
    </header>
    <div class="container">
        <div class="product-info">
            <p class="product-description">שולחן עבודה מודרני, פונקציונלי ונוח לשימוש ממושך. משלב תכנון חכם עם עיצוב אלגנטי.</p>
            <p class="product-price">💰 מחיר על בקשה</p>
            <p class="product-description"><strong>תכונות:</strong><br>✓ משטח רחב לעבודה<br>✓ הרמה מתכווננת<br>✓ אחסון חכם<br>✓ עיצוב מודרני</p>
        </div>
        <h2 class="gallery-title">🖼️ גלריית תמונות</h2>
        <div class="image-gallery">
            <div class="gallery-item" onclick="openLightbox(this)"><img src="שולחן מחשב/1.jpg" alt="תמונה 1"></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="שולחן מחשב/2.jpg" alt="תמונה 2"></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="שולחן מחשב/3.jpg" alt="תמונה 3"></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="שולחן מחשב/4.jpg" alt="תמונה 4"></div>
            <div class="gallery-item" onclick="openLightbox(this)"><img src="שולחן מחשב/WhatsApp Image 2026-04-16 at 08.43.36.jpg" alt="WhatsApp"></div>
        </div>
    </div>
    <div id="lightbox" class="lightbox"><div class="lightbox-content"><span class="lightbox-close" onclick="closeLightbox()">&times;</span><img id="lightbox-img" src="" alt=""></div></div>
    <footer><p>© 2026 Kolbo Online - All Rights Reserved</p></footer>
    <script>
        function openLightbox(element) { document.getElementById('lightbox-img').src = element.querySelector('img').src; document.getElementById('lightbox').classList.add('active'); }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
        document.addEventListener('keydown', e => e.key === 'Escape' && closeLightbox());
        document.getElementById('lightbox').addEventListener('click', e => e.target.id === 'lightbox' && closeLightbox());
    </script>
</body>
</html>
