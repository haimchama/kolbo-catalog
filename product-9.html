    <script>
        var LB_IMGS=["שולחן מאבן/11.png","שולחן מאבן/12.png","שולחן מאבן/13.png","שולחן מאבן/444.png","שולחן מאבן/5.png","שולחן מאבן/6.png","שולחן מאבן/7.png","שולחן מאבן/8.png","שולחן מאבן/9.png","שולחן מאבן/pomelli_photoshoot_image_9_16_0414 (1).jpg","שולחן מאבן/pomelli_photoshoot_image_9_16_0414.jpg","שולחן מאבן/WhatsApp Image 2026-04-13 at 09.52.27.jpg"];
        var lbIdx=0;
        function openLightbox(idx){
            lbIdx=idx;lbShow();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow='hidden';
        }
        function lbShow(){
            var img=document.getElementById('lightbox-img');
            img.src=LB_IMGS[lbIdx];
            img.alt=LB_IMGS[lbIdx];
            document.getElementById('lb-counter').textContent=(lbIdx+1)+'/'+LB_IMGS.length;
            var prev=document.querySelector('.lb-prev');
            var next=document.querySelector('.lb-next');
            prev.style.display=lbIdx>0?'block':'none';
            next.style.display=lbIdx<LB_IMGS.length-1?'block':'none';
        }
        function lbNav(dir){
            lbIdx+=dir;
            if(lbIdx<0)lbIdx=0;
            if(lbIdx>=LB_IMGS.length)lbIdx=LB_IMGS.length-1;
            lbShow();
        }
        function closeLightbox(){
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow='auto';
        }
        document.addEventListener('keydown',function(e){
            if(!document.getElementById('lightbox').classList.contains('active'))return;
            if(e.key==='ArrowLeft')lbNav(-1);
            else if(e.key==='ArrowRight')lbNav(1);
            else if(e.key==='Escape')closeLightbox();
        });
        document.getElementById('lightbox').addEventListener('click',function(e){
            if(e.target===this)closeLightbox();
        });
        var touchStartX=0;
        var touchStartY=0;
        document.getElementById('lightbox').addEventListener('touchstart',function(e){
            touchStartX=e.touches[0].clientX;
            touchStartY=e.touches[0].clientY;
        });
        document.getElementById('lightbox').addEventListener('touchend',function(e){
            if(!touchStartX || !touchStartY)return;
            var touchEndX=e.changedTouches[0].clientX;
            var touchEndY=e.changedTouches[0].clientY;
            var diffX=touchStartX-touchEndX;
            var diffY=touchStartY-touchEndY;
            if(Math.abs(diffX)>Math.abs(diffY) && Math.abs(diffX)>50){
                if(diffX>0)lbNav(1);
                else lbNav(-1);
            }
            touchStartX=0;
            touchStartY=0;
        });
    </script>
