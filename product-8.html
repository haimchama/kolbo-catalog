<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עגלה לתינוק - Kolbo Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; color: #333; line-height: 1.6; }
        header { background: #343a40; color: white; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header .back-button { display: inline-block; background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 5px; text-decoration: none; color: white; margin-bottom: 15px; transition: all 0.3s ease; }
        header .back-button:hover { background: rgba(255,255,255,0.3); }
        header h1 { font-size: 2em; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .product-info { background: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-description { font-size: 1.1em; color: #666; margin-bottom: 10px; }
        .product-price { font-size: 1.3em; color: #667eea; font-weight: 600; margin-bottom: 15px; }
        .gallery-title { font-size: 1.5em; color: #667eea; margin: 30px 0 20px 0; }
        .image-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .gallery-item { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s ease; cursor: pointer; height: 250px; }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox.active { display: flex; }
        .lightbox-content { position: relative; max-width: 90%; max-height: 90%; }
        .lightbox img { max-width: 100%; max-height: 85vh; border-radius: 8px; }
        .lightbox-close { position: absolute; top: -40px; right: -40px; color: white; font-size: 40px; cursor: pointer; z-index: 1001; }
        .lightbox-close:hover { color: #667eea; }
        footer { background: #f8f9fa; padding: 20px; text-align: center; color: #666; border-top: 1px solid #ddd; margin-top: 40px; }
        @media (max-width: 768px) { header h1 { font-size: 1.4em; } .image-gallery { grid-template-columns: repeat(2,1fr); } }
    </style>
</head>
<body>
    <header>
        <div style="text-align: center; margin-bottom: 15px;">
            <img src="logokolbo.jpeg" alt="Kolbo Logo" style="height: 80px; width: auto; border-radius: 8px;">
        </div>
        <a href="index.html" class="back-button">חזרה לקטלוג</a>
        <h1>עגלה לתינוק</h1>
    </header>
    <div class="container">
        <div class="product-info">
            <p class="product-description">עגלת תינוק נוחה וקלה לתנועה, עם חגורות בטיחות</p>
            <p class="product-price">💰 מחיר על בקשה</p>
            
        </div>
        <h2 class="gallery-title">🖼️ גלריית תמונות</h2>
        <div class="image-gallery">

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="עגלה לתינוק/1.jpg" alt="1.jpg">
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="עגלה לתינוק/2.jpg" alt="2.jpg">
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="עגלה לתינוק/3.jpg" alt="3.jpg">
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="עגלה לתינוק/4.jpg" alt="4.jpg">
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="עגלה לתינוק/5.jpg" alt="5.jpg">
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="עגלה לתינוק/6.jpg" alt="6.jpg">
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="עגלה לתינוק/7.jpg" alt="7.jpg">
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="עגלה לתינוק/8.jpg" alt="8.jpg">
            </div>
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="עגלה לתינוק/9.jpg" alt="9.jpg">
            </div>
        </div>
    </div>
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
            <img id="lightbox-img" src="" alt="">
        </div>
    </div>
    <footer>
        <p>© 2026 Kolbo Online - All Rights Reserved</p>
    </footer>
    <script>
        function openLightbox(el) { document.getElementById('lightbox-img').src=el.querySelector('img').src; document.getElementById('lightbox').classList.add('active'); document.body.style.overflow='hidden'; }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow='auto'; }
        document.addEventListener('keydown',e=>e.key==='Escape'&&closeLightbox());
        document.getElementById('lightbox').addEventListener('click',e=>e.target.id==='lightbox'&&closeLightbox());
        document.querySelectorAll('.gallery-item img').forEach(img=>img.addEventListener('error',function(){this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3EImage Not Found%3C/text%3E%3C/svg%3E';}));
    </script>
</body>
</html>
